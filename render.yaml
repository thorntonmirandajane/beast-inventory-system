databases:
  - name: beast-inventory-db
    plan: free
    databaseName: beast_inventory
    user: beast_user

services:
  - type: web
    name: beast-inventory-system
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev --ignore-scripts && npx prisma migrate deploy && npx prisma generate && npx tsx prisma/rename-skus-coc-cb.ts && npx tsx scripts/backfill-grain-diameter.ts && npm run build
    startCommand: TZ=America/Denver npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Denver
      - key: DATABASE_URL
        fromDatabase:
          name: beast-inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      # ShipHero (Bowmar Archery LLC) — on-hand inventory for forecasting.
      # Set values in the Render dashboard.
      - key: SHIPHERO_USERNAME
        sync: false
      - key: SHIPHERO_PASSWORD
        sync: false
      - key: SHIPHERO_WAREHOUSE
        value: Apex
